spring.application.name=shoplane-backend
server.port=8080

# ── H2 In-Memory Database (Development) ──────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:shoplane;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (visit http://localhost:8080/h2-console while running)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── MySQL Production (uncomment + comment H2 section above) ──────────────────
# spring.datasource.url=jdbc:mysql://localhost:3306/shoplane?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
