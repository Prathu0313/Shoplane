<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — Shoplane</title>
  <link rel="stylesheet" href="base.css"/>
  <link rel="stylesheet" href="checkout-details.css"/>
</head>
<body>

<div id="page-loader"><div class="loader-brand"><span>Shop</span>lane</div><div class="loader-bar"></div></div>
<div id="scroll-progress"><div id="scroll-progress-bar"></div></div>
<div id="toast-container"></div>

<div class="mobile-nav" id="mobile-nav">
  <a href="index.html" onclick="closeMobileNav()">Home</a>
  <a href="checkout.html" onclick="closeMobileNav()">Cart</a>
</div>

<nav id="nav">
  <a href="index.html" class="nav-logo"><span>Shop</span>lane</a>
  <ul class="nav-links">
    <li><a href="index.html#clothing-section">Clothing</a></li>
    <li><a href="index.html#accessory-section">Accessories</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
  <div class="nav-search">
    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-box" placeholder="Search products…" autocomplete="off"/>
    <div class="search-dropdown" id="search-dropdown"></div>
  </div>
  <div class="nav-actions">
    <a href="checkout.html" class="nav-icon-btn">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="cart-badge" id="cart-count">0</span>
    </a>
    <div class="nav-hamburger" onclick="toggleMobileNav()"><span></span><span></span><span></span></div>
  </div>
</nav>

<main>
  <!-- PROGRESS STEPS -->
  <div class="checkout-steps">
    <div class="step done"><div class="step-circle">✓</div><span>Cart</span></div>
    <div class="step-line done"></div>
    <div class="step active"><div class="step-circle">2</div><span>Details</span></div>
    <div class="step-line"></div>
    <div class="step"><div class="step-circle">3</div><span>Confirm</span></div>
  </div>

  <div class="checkout-layout">
    <!-- FORM -->
    <div class="form-col">
      <h2 class="form-section-title">Shipping Information</h2>

      <div id="api-error" class="api-error"></div>

      <form id="customer-form" novalidate>
        <div class="form-row two-col">
          <div class="form-group">
            <label for="fullName">Full Name *</label>
            <input type="text" id="fullName" name="fullName" placeholder="Priya Sharma" autocomplete="name"/>
            <span class="err" data-for="fullName"></span>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" autocomplete="tel"/>
            <span class="err" data-for="phone"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address <span class="optional">(optional)</span></label>
          <input type="email" id="email" name="email" placeholder="priya@email.com" autocomplete="email"/>
          <span class="err" data-for="email"></span>
        </div>

        <h2 class="form-section-title" style="margin-top:32px">Delivery Address</h2>

        <div class="form-group">
          <label for="address1">Address Line 1 *</label>
          <input type="text" id="address1" name="address1" placeholder="House/Flat No., Building Name, Street" autocomplete="address-line1"/>
          <span class="err" data-for="address1"></span>
        </div>

        <div class="form-group">
          <label for="address2">Address Line 2 <span class="optional">(optional)</span></label>
          <input type="text" id="address2" name="address2" placeholder="Area, Landmark" autocomplete="address-line2"/>
        </div>

        <div class="form-row two-col">
          <div class="form-group">
            <label for="city">City *</label>
            <input type="text" id="city" name="city" placeholder="Mumbai" autocomplete="address-level2"/>
            <span class="err" data-for="city"></span>
          </div>
          <div class="form-group">
            <label for="state">State *</label>
            <input type="text" id="state" name="state" placeholder="Maharashtra" autocomplete="address-level1"/>
            <span class="err" data-for="state"></span>
          </div>
        </div>

        <div class="form-row two-col">
          <div class="form-group">
            <label for="pincode">Pincode *</label>
            <input type="text" id="pincode" name="pincode" placeholder="400001" inputmode="numeric" autocomplete="postal-code"/>
            <span class="err" data-for="pincode"></span>
          </div>
          <div class="form-group">
            <label for="country">Country *</label>
            <input type="text" id="country" name="country" value="India" autocomplete="country-name"/>
            <span class="err" data-for="country"></span>
          </div>
        </div>

        <button type="submit" class="btn-primary submit-btn" id="btn-place-order">
          <span id="btn-label">Place Order →</span>
          <div class="spinner" id="btn-spinner"></div>
        </button>
      </form>
    </div>

    <!-- ORDER SUMMARY SIDEBAR -->
    <div class="summary-col">
      <div class="order-summary-box">
        <h3 class="summary-title">Order Summary</h3>
        <div id="summary-items"></div>
        <div class="summary-divider"></div>
        <div class="summary-total-row">
          <span>Total</span>
          <span id="summary-total">₹0</span>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="api.js"></script>
<script src="base.js"></script>
<script src="checkout-details.js"></script>
</body>
</html>
